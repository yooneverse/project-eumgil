services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-e102}
      POSTGRES_USER: ${DB_USERNAME:-e102}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-e102}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-shared-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-e102} -d ${POSTGRES_DB:-e102}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-shared-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-e102}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-e102-e102}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-shared-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-e102}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-e102-e102}
      MINIO_BUCKET: ${MINIO_BUCKET:-e102-dev}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          sleep 2
        done
        mc mb --ignore-existing "local/$$MINIO_BUCKET"
    restart: "no"

volumes:
  postgres-shared-data:
  redis-shared-data:
  minio-shared-data:
