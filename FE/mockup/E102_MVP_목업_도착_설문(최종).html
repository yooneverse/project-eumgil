<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도착 안내 화면 목업</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #0047FF;
            --star-green: #00B341;
            --text-dark: #222222;
            --text-gray: #666666;
            --border-color: #E5E5E5;
            --bg-light-blue: #F0F5FF;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* 전체 컨테이너 (두 화면 나란히 배치) */
        .mockup-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 개별 스마트폰 화면 프레임 */
        .phone-frame {
            width: 320px;
            height: 680px;
            background-color: var(--bg-light-blue);
            border-radius: 36px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 8px solid #FFFFFF;
        }

        /* 상단 상태바 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 14px 20px;
            font-size: 12px;
            font-weight: 500;
            color: #333;
            z-index: 10;
        }

        .status-icons i {
            margin-left: 4px;
        }

        /* 일러스트 배경 영역 (그라데이션 및 가짜 브릿지 효과) */
        .illustration-area {
            height: 200px;
            background: linear-gradient(180deg, #FFFFFF 0%, #DCE8FF 100%);
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
        }
        
        .bridge-mock {
            width: 100%;
            height: 60px;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 20px, rgba(160, 190, 255, 0.5) 20px, rgba(160, 190, 255, 0.5) 22px), linear-gradient(0deg, rgba(160, 190, 255, 0.3) 0%, transparent 100%);
            position: absolute;
            bottom: 0;
            border-bottom: 2px solid #A0BEFF;
        }

        /* 메인 텍스트 컨텐츠 */
        .content-area {
            flex: 1;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .main-title {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .sub-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0 0 20px 0;
        }

        .desc-text {
            font-size: 13px;
            color: var(--text-gray);
            line-height: 1.5;
            margin-bottom: auto;
        }

        /* 버튼 그룹 */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-blue);
            color: white;
        }

        .btn-secondary {
            background-color: white;
            color: var(--primary-blue);
            border: 1px solid var(--border-color);
        }

        /* 하단 네비게이션 바 */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 12px 0 20px 0;
            background-color: white;
            border-top: 1px solid var(--border-color);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #999;
            font-size: 10px;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--primary-blue);
        }

        .nav-item i {
            font-size: 18px;
        }

        /* 바텀 시트 오버레이 (오른쪽 화면용) */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 20;
            display: flex;
            align-items: flex-end;
        }

        .bottom-sheet {
            width: 100%;
            background-color: white;
            border-radius: 20px 20px 0 0;
            padding: 24px 20px;
            box-sizing: border-box;
            position: relative;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .sheet-title {
            font-size: 16px;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 18px;
            color: #999;
            cursor: pointer;
        }

        .rating-question {
            text-align: center;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .stars {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .stars i {
            color: var(--star-green);
            font-size: 24px;
        }

        .rating-text {
            text-align: center;
            font-size: 12px;
            color: var(--star-green);
            font-weight: 700;
            margin-bottom: 24px;
        }

    </style>
</head>
<body>

<div class="mockup-container">

    <div class="phone-frame">
        <div class="status-bar">
            <span>9:41</span>
            <div class="status-icons">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-full"></i>
            </div>
        </div>

        <div class="illustration-area">
            <div class="bridge-mock"></div>
        </div>

        <div class="content-area">
            <div class="main-title">오늘도 안전한 이동</div>
            <h1 class="sub-title">수고하셨습니다!</h1>
            <p class="desc-text">부산이음길이 함께하여<br>더 편안한 이동이 되셨기를 바랍니다.</p>
            
            <div class="button-group">
                <button class="btn btn-primary">
                    <i class="fa-solid fa-house"></i> 홈으로 돌아가기
                </button>
                <button class="btn btn-secondary">
                    <i class="fa-solid fa-magnifying-glass"></i> 새 경로 탐색하기
                </button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active"><i class="fa-solid fa-house"></i><span>홈</span></div>
            <div class="nav-item"><i class="fa-regular fa-bookmark"></i><span>북마크</span></div>
            <div class="nav-item"><i class="fa-regular fa-bell"></i><span>제보</span></div>
            <div class="nav-item"><i class="fa-regular fa-user"></i><span>마이페이지</span></div>
        </div>
    </div>


    <div class="phone-frame">
        <div class="status-bar" style="background-color: rgba(0,0,0,0.1);">
            <span>9:41</span>
            <div class="status-icons">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-battery-full"></i>
            </div>
        </div>

        <div class="illustration-area">
            <div class="bridge-mock"></div>
        </div>

        <div class="content-area">
            <div class="main-title">오늘도 안전한 이동</div>
            <h1 class="sub-title">수고하셨습니다!</h1>
            <p class="desc-text">부산이음길이 함께하여<br>더 편안한 이동이 되셨기를 바랍니다.</p>
            <div class="button-group">
                <button class="btn btn-primary"><i class="fa-solid fa-house"></i> 홈으로 돌아가기</button>
            </div>
        </div>

        <div class="overlay">
            <div class="bottom-sheet">
                <div class="sheet-header">
                    <span class="sheet-title">경로 평가</span>
                    <button class="close-btn"><i class="fa-solid fa-xmark"></i></button>
                </div>
                
                <div class="rating-question">이번 경로는 어떠셨나요?</div>
                
                <div class="stars">
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                </div>
                <div class="rating-text">매우 만족</div>

                <div class="button-group" style="margin-bottom: 0;">
                    <button class="btn btn-secondary">
                        <i class="fa-regular fa-bookmark"></i> 이 경로 저장하기
                    </button>
                    <button class="btn btn-primary" style="margin-top: 10px;">
                        평가 등록
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
