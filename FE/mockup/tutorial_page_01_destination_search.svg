<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <style>
      .font { font-family: Pretendard, "Noto Sans KR", "Malgun Gothic", Arial, sans-serif; }
      .eyebrow { font-size: 34px; font-weight: 900; fill: #1463f3; }
      .headline { font-size: 48px; font-weight: 900; fill: #2d2f36; letter-spacing: 0; }
      .body { font-size: 22px; font-weight: 700; fill: #667085; }
      .phone { fill: #14171d; filter: drop-shadow(0 24px 34px rgba(8, 25, 70, 0.24)); }
      .screen { fill: #ffffff; }
      .bar { font-size: 17px; font-weight: 800; fill: #1f2937; }
      .label { font-size: 24px; font-weight: 900; fill: #111827; }
      .small { font-size: 17px; font-weight: 700; fill: #667085; }
      .chipText { font-size: 18px; font-weight: 900; fill: #111827; }
      .blueText { fill: #1463f3; }
      .navText { font-size: 17px; font-weight: 800; fill: #8b95a5; }
    </style>
    <pattern id="mapGrid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#dce6f5" stroke-width="1"/>
      <path d="M0 22H42M20 0V42" fill="none" stroke="#ecf2fb" stroke-width="1"/>
    </pattern>
    <linearGradient id="mapBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#f5f8fc"/>
      <stop offset="1" stop-color="#eaf5ff"/>
    </linearGradient>
    <clipPath id="screenClip">
      <rect x="129" y="381" width="822" height="872" rx="54"/>
    </clipPath>
  </defs>

  <rect width="1080" height="1350" fill="#f1f2f7"/>

  <text x="540" y="150" text-anchor="middle" class="font eyebrow">지도 홈 메인화면</text>
  <text x="540" y="238" text-anchor="middle" class="font headline">목적지를 검색하고</text>
  <text x="540" y="306" text-anchor="middle" class="font headline">주변 접근성 정보를 확인해요</text>
  <text x="540" y="360" text-anchor="middle" class="font body">검색창과 필터를 사용해 필요한 장소와 시설을 빠르게 찾아보세요.</text>

  <!-- Phone frame -->
  <rect x="85" y="365" width="910" height="900" rx="74" class="phone"/>
  <rect x="107" y="387" width="866" height="856" rx="58" fill="#262a31"/>
  <rect x="129" y="381" width="822" height="872" rx="54" class="screen"/>
  <circle cx="540" cy="407" r="17" fill="#0e1117"/>
  <circle cx="540" cy="407" r="7" fill="#1e80ff"/>

  <g clip-path="url(#screenClip)">
    <!-- Map area -->
    <rect x="129" y="381" width="822" height="520" fill="url(#mapBg)"/>
    <rect x="129" y="381" width="822" height="520" fill="url(#mapGrid)" opacity="0.9"/>
    <path d="M193 420 C238 520 207 675 320 780" fill="none" stroke="#bfe2ff" stroke-width="18" opacity="0.75"/>
    <path d="M765 385 C712 488 826 620 702 850" fill="none" stroke="#bfe2ff" stroke-width="62" opacity="0.65"/>
    <path d="M180 570 L340 610 L474 560 L660 600 L812 528" fill="none" stroke="#ffe6af" stroke-width="18" opacity="0.62"/>
    <path d="M250 470 L390 650 L520 710 L760 680" fill="none" stroke="#cdd8e7" stroke-width="9"/>
    <path d="M204 760 L392 704 L515 806 L728 742" fill="none" stroke="#cdd8e7" stroke-width="9"/>

    <!-- Status bar -->
    <text x="166" y="435" class="font bar">12:30</text>
    <text x="774" y="435" class="font bar">HD 5G ▴ 100%</text>

    <!-- Search -->
    <rect x="176" y="488" width="728" height="92" rx="24" fill="#ffffff" stroke="#e5ebf5" filter="drop-shadow(0 8px 12px rgba(16, 24, 40, 0.10))"/>
    <circle cx="222" cy="534" r="18" fill="none" stroke="#8b95a5" stroke-width="5"/>
    <line x1="236" y1="548" x2="254" y2="566" stroke="#8b95a5" stroke-width="5" stroke-linecap="round"/>
    <text x="292" y="545" class="font" font-size="29" font-weight="800" fill="#8b95a5">어디로 가시나요?</text>
    <text x="834" y="548" class="font" font-size="43" font-weight="900" fill="#1463f3">♬</text>

    <!-- Filter chips -->
    <g transform="translate(176 604)">
      <rect width="206" height="68" rx="18" fill="#ffffff" stroke="#e4ebf5" filter="drop-shadow(0 6px 10px rgba(16,24,40,0.08))"/>
      <text x="32" y="43" class="font" font-size="34" fill="#1463f3">♿</text>
      <text x="73" y="43" class="font chipText">장애인 화장실</text>
    </g>
    <g transform="translate(396 604)">
      <rect width="184" height="68" rx="18" fill="#ffffff" stroke="#e4ebf5" filter="drop-shadow(0 6px 10px rgba(16,24,40,0.08))"/>
      <text x="31" y="44" class="font" font-size="34" fill="#1463f3">▣</text>
      <text x="75" y="43" class="font chipText">엘리베이터</text>
    </g>
    <g transform="translate(594 604)">
      <rect width="206" height="68" rx="18" fill="#ffffff" stroke="#e4ebf5" filter="drop-shadow(0 6px 10px rgba(16,24,40,0.08))"/>
      <text x="32" y="43" class="font" font-size="34" fill="#1463f3">P</text>
      <text x="72" y="43" class="font chipText">장애인 주차장</text>
    </g>
    <g transform="translate(812 604)">
      <rect width="92" height="68" rx="18" fill="#ffffff" stroke="#e4ebf5" filter="drop-shadow(0 6px 10px rgba(16,24,40,0.08))"/>
      <text x="28" y="43" class="font chipText">더보기</text>
    </g>

    <!-- Map labels and markers -->
    <text x="388" y="471" class="font small">부산역</text>
    <text x="190" y="747" class="font small">부산진구청</text>
    <text x="262" y="846" class="font small">서면역</text>
    <text x="720" y="742" class="font small">부산항국제</text>
    <text x="720" y="770" class="font small">여객터미널</text>
    <circle cx="512" cy="736" r="72" fill="#1463f3" opacity="0.12"/>
    <path d="M512 666 C546 666 574 692 574 724 C574 767 512 822 512 822 C512 822 450 767 450 724 C450 692 478 666 512 666Z" fill="#1463f3"/>
    <circle cx="512" cy="724" r="23" fill="#ffffff"/>
    <circle cx="512" cy="724" r="11" fill="#1463f3"/>
    <rect x="442" y="640" width="140" height="56" rx="24" fill="#1463f3"/>
    <text x="512" y="676" text-anchor="middle" class="font" font-size="24" font-weight="900" fill="#fff">현 위치</text>

    <circle cx="405" cy="736" r="19" fill="#1463f3"/>
    <text x="405" y="746" text-anchor="middle" class="font" font-size="25" font-weight="900" fill="#fff">P</text>
    <circle cx="628" cy="760" r="19" fill="#1463f3"/>
    <text x="628" y="770" text-anchor="middle" class="font" font-size="25" font-weight="900" fill="#fff">P</text>
    <circle cx="230" cy="905" r="22" fill="#36af73"/>
    <text x="230" y="914" text-anchor="middle" class="font" font-size="24" font-weight="900" fill="#fff">▲</text>

    <!-- Map controls -->
    <rect x="824" y="700" width="70" height="140" rx="20" fill="#fff" stroke="#e5ebf5" filter="drop-shadow(0 7px 12px rgba(16,24,40,0.12))"/>
    <text x="859" y="754" text-anchor="middle" class="font" font-size="44" fill="#111827">+</text>
    <line x1="839" y1="770" x2="879" y2="770" stroke="#edf2f7"/>
    <text x="859" y="820" text-anchor="middle" class="font" font-size="50" fill="#111827">−</text>
    <rect x="824" y="866" width="70" height="70" rx="20" fill="#fff" stroke="#e5ebf5" filter="drop-shadow(0 7px 12px rgba(16,24,40,0.12))"/>
    <text x="859" y="913" text-anchor="middle" class="font" font-size="38" fill="#111827">⌖</text>

    <!-- Bottom sheet -->
    <rect x="129" y="880" width="822" height="330" rx="42" fill="#fff" stroke="#e5ebf5"/>
    <rect x="500" y="897" width="80" height="10" rx="5" fill="#d8dee8"/>
    <text x="180" y="954" class="font" font-size="26" font-weight="900" fill="#111827">⛅ 부산 중구</text>
    <line x1="350" y1="925" x2="350" y2="965" stroke="#d8dee8"/>
    <text x="382" y="954" class="font" font-size="25" font-weight="800" fill="#111827">구름 많음 24°C</text>
    <text x="770" y="954" class="font" font-size="23" font-weight="800" fill="#111827">미세먼지 </text>
    <text x="870" y="954" class="font" font-size="23" font-weight="900" fill="#18a058">보통 ›</text>

    <g transform="translate(170 990)">
      <rect width="178" height="116" rx="14" fill="#f0f6ff" stroke="#cfe0ff"/>
      <text x="89" y="36" text-anchor="middle" class="font" font-size="25" font-weight="900" fill="#1463f3">지금</text>
      <text x="89" y="72" text-anchor="middle" class="font" font-size="34">☁</text>
      <text x="89" y="102" text-anchor="middle" class="font" font-size="24" font-weight="800" fill="#111827">24°C</text>
    </g>
    <g transform="translate(370 990)">
      <rect width="178" height="116" rx="14" fill="#fff" stroke="#e4ebf5"/>
      <text x="89" y="36" text-anchor="middle" class="font" font-size="25" font-weight="800" fill="#111827">12시</text>
      <text x="89" y="72" text-anchor="middle" class="font" font-size="30">🌤</text>
      <text x="89" y="102" text-anchor="middle" class="font" font-size="24" font-weight="800" fill="#111827">25°C</text>
    </g>
    <g transform="translate(570 990)">
      <rect width="178" height="116" rx="14" fill="#fff" stroke="#e4ebf5"/>
      <text x="89" y="36" text-anchor="middle" class="font" font-size="25" font-weight="800" fill="#111827">15시</text>
      <text x="89" y="72" text-anchor="middle" class="font" font-size="30">☁</text>
      <text x="89" y="102" text-anchor="middle" class="font" font-size="24" font-weight="800" fill="#111827">26°C</text>
    </g>
    <g transform="translate(770 990)">
      <rect width="142" height="116" rx="14" fill="#fff" stroke="#e4ebf5"/>
      <text x="71" y="36" text-anchor="middle" class="font" font-size="25" font-weight="800" fill="#111827">18시</text>
      <text x="71" y="72" text-anchor="middle" class="font" font-size="30">🌤</text>
      <text x="71" y="102" text-anchor="middle" class="font" font-size="24" font-weight="800" fill="#111827">24°C</text>
    </g>

    <!-- Bottom nav -->
    <rect x="129" y="1210" width="822" height="108" fill="#fff"/>
    <line x1="129" y1="1210" x2="951" y2="1210" stroke="#edf2f7"/>
    <text x="250" y="1250" text-anchor="middle" class="font" font-size="34" fill="#1463f3">⌂</text>
    <text x="250" y="1280" text-anchor="middle" class="font navText" fill="#1463f3">홈</text>
    <text x="430" y="1250" text-anchor="middle" class="font" font-size="34" fill="#8b95a5">♡</text>
    <text x="430" y="1280" text-anchor="middle" class="font navText">북마크</text>
    <text x="610" y="1250" text-anchor="middle" class="font" font-size="34" fill="#8b95a5">⚑</text>
    <text x="610" y="1280" text-anchor="middle" class="font navText">제보</text>
    <text x="790" y="1250" text-anchor="middle" class="font" font-size="34" fill="#8b95a5">○</text>
    <text x="790" y="1280" text-anchor="middle" class="font navText">마이페이지</text>
  </g>

  <!-- Callout highlights -->
  <rect x="160" y="470" width="760" height="130" rx="30" fill="none" stroke="#1463f3" stroke-width="7" opacity="0.96"/>
  <text x="178" y="464" class="font" font-size="21" font-weight="900" fill="#1463f3">목적지 검색</text>
  <rect x="160" y="592" width="760" height="98" rx="28" fill="none" stroke="#1463f3" stroke-width="6" opacity="0.58"/>
  <text x="178" y="706" class="font" font-size="21" font-weight="900" fill="#1463f3">접근성 필터</text>
</svg>
