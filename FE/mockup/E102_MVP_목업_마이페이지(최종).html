<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 목업</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #007AFF;
            --bg-gray: #F8F9FA;
            --border-gray: #E5E5E5;
            --text-dark: #333;
            --text-light: #888;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
        }

        /* 모바일 컨테이너 시뮬레이션 */
        .mobile-container {
            width: 375px;
            height: 812px;
            background-color: white;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow-y: auto;
            border-radius: 30px;
            margin: 20px;
        }

        /* 헤더 */
        .header {
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            border-bottom: 1px solid var(--border-gray);
        }

        /* 유저 프로필 섹션 */
        .profile-card {
            background-color: var(--primary-blue);
            margin: 15px;
            padding: 20px;
            border-radius: 15px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            background-color: #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .user-text .name { font-size: 18px; font-weight: 600; }
        .user-text .mode { font-size: 12px; opacity: 0.8; }

        .change-type-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            cursor: pointer;
        }

        /* 활동 뱃지 */
        .section-title {
            padding: 0 20px;
            font-size: 14px;
            font-weight: bold;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .badge-container {
            display: flex;
            justify-content: space-around;
            padding: 10px 20px;
            margin-bottom: 20px;
        }

        .badge-item {
            text-align: center;
            font-size: 11px;
        }

        .badge-icon {
            width: 45px;
            height: 45px;
            margin-bottom: 5px;
        }

        /* 메뉴 리스트 */
        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid #f9f9f9;
            cursor: pointer;
        }

        .menu-item:active { background-color: #f5f5f5; }

        .menu-label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        /* 토글 스위치 */
        .switch {
            width: 40px;
            height: 20px;
            background-color: var(--primary-blue);
            border-radius: 20px;
            position: relative;
        }

        .switch::after {
            content: '';
            position: absolute;
            right: 2px;
            top: 2px;
            width: 16px;
            height: 16px;
            background-color: white;
            border-radius: 50%;
        }

        /* 로그아웃 버튼 */
        .logout-btn {
            margin: 30px 20px;
            background-color: #FFF0F0;
            color: #FF4D4D;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 하단 네비게이션 */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: white;
            border-top: 1px solid var(--border-gray);
        }

        .nav-item {
            text-align: center;
            color: var(--text-light);
            font-size: 10px;
        }

        .nav-item.active { color: var(--primary-blue); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="mobile-container">
        <div class="header">마이페이지</div>

        <div class="profile-card">
            <div class="user-info">
                <div class="avatar"><i class="fas fa-user"></i></div>
                <div class="user-text">
                    <div class="name">이용진 사용자</div>
                    <div class="mode">보행약자 모드</div>
                </div>
            </div>
            <button class="change-type-btn">사용자 유형 변경</button>
        </div>

        <div class="section-title">활동 뱃지</div>
        <div class="badge-container">
            <div class="badge-item">
                <img src="https://cdn-icons-png.flaticon.com/512/179/179249.png" class="badge-icon" alt="제보왕">
                <div>제보왕<br><span style="color:#888">10회 달성</span></div>
            </div>
            <div class="badge-item">
                <img src="https://cdn-icons-png.flaticon.com/512/179/179250.png" class="badge-icon" alt="도움왕">
                <div>도움왕<br><span style="color:#888">5회 달성</span></div>
            </div>
            <div class="badge-item">
                <img src="https://cdn-icons-png.flaticon.com/512/179/179251.png" class="badge-icon" alt="참여왕">
                <div>참여왕<br><span style="color:#888">30일 달성</span></div>
            </div>
        </div>

        <div class="section-title">주요 메뉴</div>
        <ul class="menu-list">
            <li class="menu-item">
                <div class="menu-label"><i class="far fa-bell"></i> 공지사항</div>
                <i class="fas fa-chevron-right" style="color:#ccc; font-size: 12px;"></i>
            </li>
            <li class="menu-item">
                <div class="menu-label"><i class="far fa-edit"></i> 제보 내역</div>
                <i class="fas fa-chevron-right" style="color:#ccc; font-size: 12px;"></i>
            </li>
            <li class="menu-item">
                <div class="menu-label"><i class="far fa-question-circle"></i> 앱 정보 및 도움말</div>
                <i class="fas fa-chevron-right" style="color:#ccc; font-size: 12px;"></i>
            </li>
        </ul>

        <div class="section-title" style="margin-top:20px;">기타 메뉴</div>
        <ul class="menu-list">
            <li class="menu-item">
                <div class="menu-label">푸시 알림</div>
                <div class="switch"></div>
            </li>
            <li class="menu-item">
                <div class="menu-label">진동 알림</div>
                <div class="switch"></div>
            </li>
        </ul>

        <div class="logout-btn">로그아웃</div>

        <div class="bottom-nav">
            <div class="nav-item"><i class="fas fa-home"></i>홈</div>
            <div class="nav-item"><i class="far fa-bookmark"></i>북마크</div>
            <div class="nav-item"><i class="far fa-comment-dots"></i>제보</div>
            <div class="nav-item active"><i class="fas fa-user"></i>마이페이지</div>
        </div>
    </div>

</body>
</html>
