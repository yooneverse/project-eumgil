<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내비게이션 안내 화면 목업</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ── 기기 프레임 ── */
    .device {
      width: 375px;
      height: 812px;
      background: #1C1C1E;
      border-radius: 44px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
      position: relative;
    }

    /* ── 상태바 ── */
    .status-bar {
      height: 44px;
      background: #1C1C1E;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    .status-bar .time {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }
    .status-bar .icons {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
    }

    /* ── 화면 본문 ── */
    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 20px 16px;
      gap: 20px;
      overflow: hidden;
    }

    /* ── 상단 지표 영역 (남은 거리 / 남은 시간) ── */
    .metrics-row {
      display: flex;
      align-items: stretch;
      gap: 0;
    }
    .metric-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .metric-item + .metric-item {
      border-left: 1.5px solid #3A3A3C;
    }
    .metric-label {
      font-size: 14px;
      color: #AEAEB2;
      font-weight: 400;
      letter-spacing: 0.01em;
    }
    .metric-value {
      font-size: 64px;
      font-weight: 800;
      color: #F2B705;
      line-height: 1;
      letter-spacing: -2px;
    }

    /* ── 현재 위치 카드 ── */
    .location-card {
      background: #F2B705;
      border-radius: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px 24px;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .location-card:active { filter: brightness(0.92); }

    .location-pin {
      width: 72px;
      height: 72px;
    }
    .location-label {
      font-size: 32px;
      font-weight: 800;
      color: #1C1C1E;
      letter-spacing: -0.5px;
    }

    /* ── 안내 종료 카드 ── */
    .exit-card {
      background: #2C2C2E;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 28px 24px;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .exit-card:active { filter: brightness(1.12); }

    .exit-btn {
      width: 64px;
      height: 64px;
      background: #FF6B6B;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .exit-btn svg { width: 28px; height: 28px; }

    .exit-label {
      font-size: 28px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.5px;
    }

    /* ── 하단 탭 바 ── */
    .tab-bar {
      height: 83px;
      background: #1C1C1E;
      border-top: 1px solid #3A3A3C;
      display: flex;
      align-items: flex-start;
      padding-top: 10px;
      flex-shrink: 0;
    }
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .tab-item svg {
      width: 24px;
      height: 24px;
    }
    .tab-label {
      font-size: 10px;
      font-weight: 500;
      color: #636366;
    }
    .tab-item.active .tab-label { color: #F2B705; }
    .tab-item.active svg { color: #F2B705; }
    .tab-item svg { color: #636366; }

    /* ── 홈 인디케이터 ── */
    .home-indicator {
      height: 8px;
      background: #1C1C1E;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 4px;
      flex-shrink: 0;
    }
    .home-indicator-bar {
      width: 134px;
      height: 5px;
      background: #636366;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="device">

    <!-- 상태바 -->
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor">
          <rect x="0" y="3" width="3" height="9" rx="1"/>
          <rect x="4.5" y="2" width="3" height="10" rx="1"/>
          <rect x="9" y="0" width="3" height="12" rx="1"/>
          <rect x="13.5" y="0" width="2.5" height="12" rx="1" opacity="0.3"/>
        </svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor">
          <rect x="0" y="3" width="3" height="9" rx="1"/>
          <rect x="4.5" y="2" width="3" height="10" rx="1"/>
          <rect x="9" y="0" width="3" height="12" rx="1"/>
          <rect x="13.5" y="0" width="2.5" height="12" rx="1" opacity="0.3"/>
        </svg>
        <svg width="15" height="12" viewBox="0 0 15 12" fill="currentColor">
          <path d="M7.5 2C10.8 2 13.7 3.4 15.7 5.7L14.3 7.2C12.7 5.3 10.2 4 7.5 4C4.8 4 2.3 5.3 0.7 7.2L-.7 5.7C1.3 3.4 4.2 2 7.5 2Z" opacity="0.3"/>
          <path d="M7.5 5.5C9.8 5.5 11.8 6.5 13.2 8.1L11.8 9.6C10.8 8.4 9.3 7.5 7.5 7.5C5.7 7.5 4.2 8.4 3.2 9.6L1.8 8.1C3.2 6.5 5.2 5.5 7.5 5.5Z"/>
          <circle cx="7.5" cy="11" r="1.5"/>
        </svg>
        <span>85%</span>
      </div>
    </div>

    <!-- 화면 본문 -->
    <div class="screen">

      <!-- 지표 행 -->
      <div class="metrics-row">
        <div class="metric-item">
          <span class="metric-label">남은 거리</span>
          <span class="metric-value">50<small style="font-size:36px; font-weight:800; letter-spacing:0;">M</small></span>
        </div>
        <div class="metric-item">
          <span class="metric-label">남은 시간</span>
          <span class="metric-value">2<small style="font-size:36px; font-weight:800; letter-spacing:0;">분</small></span>
        </div>
      </div>

      <!-- 현재 위치 카드 -->
      <div class="location-card" role="button" aria-label="현재 위치 확인">
        <!-- Location Pin SVG -->
        <svg class="location-pin" viewBox="0 0 72 80" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M36 0C21.1 0 9 12.1 9 27C9 45.8 36 80 36 80C36 80 63 45.8 63 27C63 12.1 50.9 0 36 0Z" fill="#1C1C1E"/>
          <circle cx="36" cy="27" r="11" fill="#F2B705"/>
        </svg>
        <span class="location-label">현재 위치</span>
      </div>

      <!-- 안내 종료 카드 -->
      <div class="exit-card" role="button" aria-label="안내 종료">
        <div class="exit-btn">
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 6L22 22M22 6L6 22" stroke="#1C1C1E" stroke-width="3.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="exit-label">안내 종료</span>
      </div>

    </div><!-- /screen -->

    <!-- 하단 탭 바 -->
    <div class="tab-bar">
      <!-- 홈 (활성) -->
      <div class="tab-item active">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span class="tab-label">홈</span>
      </div>
      <!-- 북마크 -->
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
        </svg>
        <span class="tab-label">북마크</span>
      </div>
      <!-- 카테고리 -->
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="tab-label">카테고리</span>
      </div>
      <!-- 마이페이지 -->
      <div class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="tab-label">마이페이지</span>
      </div>
    </div>

    <!-- 홈 인디케이터 -->
    <div class="home-indicator">
      <div class="home-indicator-bar"></div>
    </div>

  </div><!-- /device -->
</body>
</html>
