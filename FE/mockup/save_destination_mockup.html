<!--
  시각지원 모드 — "도착지 저장 / 완료" 화면 mockup
  html.to.design 같은 Figma 임포트 플러그인을 거쳐 레이어로 변환되는 것을 전제로 작성.

  기존 mockup(agree_5page_mockup.html 등)이 따르는 element-prefix 클래스 컨벤션을 그대로 사용:
    div.mobile-frame / div.status-bar / div.card / span.label / nav.android-bar 등
  → Figma 레이어 이름으로 그대로 따라 들어가서, 같은 컴포넌트 패턴으로 묶어 정리하기 쉬움.

  컬러 토큰은 기존 약관 화면(color/yellow/50 = #FFCC00, color/black/solid = #000000)에 맞춤.
  최종 톤이 Gold(#FFD400)면 :root의 --color-yellow-50 한 줄만 교체.
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>save_destination_mockup</title>
  <style>
    :root {
      --color-yellow-50: #FFCC00;          /* Supernova — 카드 배경, 강조 텍스트 */
      --color-black-solid: #000000;
      --color-white-solid: #FFFFFF;
      --color-grey-10: #1A1A1A;            /* Cod Gray — 모바일 프레임 보더 */
      --color-grey-20: #333333;            /* Mine Shaft — 비활성 보더(예비) */
      --color-grey-53: #888888;            /* Gray — 안드로이드 nav bar 색 */
      --font-family-2: 'Inter', 'Noto Sans KR', sans-serif;
      --font-family-4: 'Times New Roman', serif;
      --radius-card: 24px;
      --radius-frame: 40px;
      --stroke-frame: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px;
      font-family: var(--font-family-2);
    }

    /* ─────────────────────────────────────────────────────────── */
    /* 모바일 프레임 — 다른 mockup 화면과 동일한 376x756 베이스        */
    /* ─────────────────────────────────────────────────────────── */
    .div-mobile-frame {
      width: 376px;
      height: 780px;
      background: var(--color-black-solid);
      border: var(--stroke-frame) solid var(--color-grey-10);
      border-radius: var(--radius-frame);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 상단 status bar — 9:41 / 시그널 / 와이파이 / 85% */
    .div-status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 44px;
      padding: 0 24px;
      color: var(--color-white-solid);
      font-family: var(--font-family-4);
      font-size: 14px;
    }

    .div-status-bar .span-time { font-weight: 400; }

    .div-status-bar .div-status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 상단 중앙 위치 핀(작은 보조 아이콘) */
    .div-status-accent {
      display: flex;
      justify-content: center;
      padding-top: 4px;
    }

    /* ─────────────────────────────────────────────────────────── */
    /* 메인 컨텐츠 — 카드 2단(저장 카드 / 완료 카드)                  */
    /* ─────────────────────────────────────────────────────────── */
    .div-content {
      flex: 1 0 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 24px;
      min-height: 0;
    }

    /* div.card.primary — 도착지 저장 (노랑 배경, 검정 텍스트) */
    .div-card-primary {
      flex: 1.2 0 0;
      background: var(--color-yellow-50);
      border-radius: var(--radius-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    .div-card-primary .span-label {
      color: var(--color-black-solid);
      font-family: var(--font-family-2);
      font-weight: 900;
      font-size: 40px;
      letter-spacing: -1px;
      line-height: 1.1;
    }

    /* div.card.secondary — 완료 (검정 배경, 노랑 보더, 노랑 텍스트) */
    .div-card-secondary {
      flex: 1 0 0;
      background: var(--color-black-solid);
      border: 3px solid var(--color-yellow-50);
      border-radius: var(--radius-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    .div-card-secondary .span-label {
      color: var(--color-yellow-50);
      font-family: var(--font-family-2);
      font-weight: 900;
      font-size: 40px;
      letter-spacing: -1px;
      line-height: 1.1;
    }

    /* ─────────────────────────────────────────────────────────── */
    /* 하단 안드로이드 navigation bar (재생/홈/뒤로 mock 3 버튼)      */
    /* ─────────────────────────────────────────────────────────── */
    .nav-android-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 40px;
      padding: 0 96px;
      opacity: 0.6;
    }

    .nav-android-bar .nav-button {
      width: 16px;
      height: 12px;
      border: 2px solid var(--color-grey-53);
      border-radius: 2px;
    }

    .nav-android-bar .nav-button.home { border-radius: 50%; width: 16px; height: 16px; }

    .nav-android-bar .nav-button.back {
      width: 14px; height: 14px;
      border: none;
      border-bottom: 2px solid var(--color-grey-53);
      border-left: 2px solid var(--color-grey-53);
      transform: rotate(45deg);
    }
  </style>
</head>
<body>
  <!-- ⬇︎ html.to.design은 이 div.mobile-frame 트리만 잡아 Figma frame으로 변환합니다. -->
  <div class="div-mobile-frame" data-name="div.mobile-frame">

    <!-- 상단 status bar -->
    <div class="div-status-bar" data-name="div.status-bar">
      <span class="span-time" data-name="span.time">9:41</span>
      <div class="div-status-icons" data-name="div.status-icons">
        <!-- 와이파이 아이콘 (Vector) -->
        <svg width="18" height="14" viewBox="0 0 18 14" xmlns="http://www.w3.org/2000/svg" data-name="svg.icon-wifi">
          <path d="M9 13.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z" fill="#FFFFFF"/>
          <path d="M2.5 6.5C4.4 4.7 6.6 3.7 9 3.7c2.4 0 4.6 1 6.5 2.8M5.2 9.2C6.3 8.2 7.6 7.6 9 7.6c1.4 0 2.7.6 3.8 1.6"
                stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
        <!-- 신호 막대 (Vector) -->
        <svg width="18" height="14" viewBox="0 0 18 14" xmlns="http://www.w3.org/2000/svg" data-name="svg.icon-signal">
          <rect x="1" y="9" width="3" height="4" fill="#FFFFFF"/>
          <rect x="6" y="6" width="3" height="7" fill="#FFFFFF"/>
          <rect x="11" y="3" width="3" height="10" fill="#FFFFFF"/>
        </svg>
        <span class="span-battery" data-name="span.battery">85%</span>
      </div>
    </div>

    <!-- status accent: 중앙 노랑 위치 핀 -->
    <div class="div-status-accent" data-name="div.status-accent">
      <svg width="18" height="22" viewBox="0 0 24 28" xmlns="http://www.w3.org/2000/svg" data-name="svg.icon-pin-accent">
        <path d="M12 2C7.6 2 4 5.6 4 10c0 6 8 16 8 16s8-10 8-16c0-4.4-3.6-8-8-8Zm0 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6Z"
              fill="#FFCC00"/>
      </svg>
    </div>

    <!-- 본문 카드 2단 -->
    <div class="div-content" data-name="div.content">

      <!-- 카드 1: 도착지 저장 -->
      <div class="div-card-primary" data-name="div.card.primary">
        <svg width="120" height="140" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg" data-name="svg.icon-bookmark-pin">
          <!-- 북마크 외곽 -->
          <path d="M20 8h80a8 8 0 0 1 8 8v116l-48-32-48 32V16a8 8 0 0 1 8-8Z"
                fill="#000000"/>
          <!-- 안쪽 핀 -->
          <circle cx="60" cy="58" r="14" fill="#FFCC00"/>
          <path d="M60 36c-12 0-22 10-22 22 0 16 22 36 22 36s22-20 22-36c0-12-10-22-22-22Z"
                fill="none" stroke="#FFCC00" stroke-width="6"/>
        </svg>
        <span class="span-label" data-name="span.label">도착지 저장</span>
      </div>

      <!-- 카드 2: 완료 -->
      <div class="div-card-secondary" data-name="div.card.secondary">
        <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" data-name="svg.icon-check-circle">
          <circle cx="60" cy="60" r="48" fill="none" stroke="#FFCC00" stroke-width="8"/>
          <path d="M38 62 L54 78 L84 46" stroke="#FFCC00" stroke-width="10"
                stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <span class="span-label" data-name="span.label">완료</span>
      </div>
    </div>

    <!-- 하단 안드로이드 navigation bar -->
    <nav class="nav-android-bar" data-name="nav.android-bar">
      <div class="nav-button" data-name="nav.button.recents"></div>
      <div class="nav-button home" data-name="nav.button.home"></div>
      <div class="nav-button back" data-name="nav.button.back"></div>
    </nav>
  </div>
</body>
</html>
