<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이음길 약관동의 화면 일람</title>
    <style>
        :root {
            --main-yellow: #FFCC00;
            --bg-black: #000000;
            --nav-bg: #000000;
            --text-white: #FFFFFF;
        }

        body {
            margin: 0;
            padding: 40px;
            background-color: #333333; /* 배경과 구분하기 위한 어두운 회색 */
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            display: flex;
            gap: 30px;
            overflow-x: auto;
        }

        /* 개별 모바일 화면 프레임 */
        .mobile-frame {
            min-width: 360px;
            height: 740px;
            background-color: var(--bg-black);
            border-radius: 40px;
            border: 8px solid #1a1a1a;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* 상단 인디케이터 구역 */
        .header-area {
            margin-top: 50px;
            text-align: center;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .dot { 
            width: 8px; height: 8px; 
            background: #444; 
            border-radius: 50%; 
        }
        .dot.active { background: var(--main-yellow); }
        
        .header-text {
            color: var(--main-yellow);
            font-size: 24px;
            font-weight: 800;
            margin: 0;
        }

        /* 중앙 노란색 카드 */
        .main-card {
            margin-top: 40px;
            width: 80%;
            aspect-ratio: 1 / 1.15;
            background-color: var(--main-yellow);
            border-radius: 35px;
            border: 2.5px solid #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .icon-svg {
            width: 90px;
            height: 90px;
            fill: black;
            margin-bottom: 10px;
        }

        .card-label {
            color: black;
            font-size: 40px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        /* 하단 안내 문구 및 버튼 */
        .bottom-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: auto;
            margin-bottom: 100px; /* 네비게이션 공간 확보 */
        }

        .hint-text {
            color: white;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .more-button {
            width: 80%;
            background-color: var(--main-yellow);
            color: black;
            border: none;
            padding: 18px 0;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 900;
        }

        /* 하단 고정 내비게이션 바 */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70px;
            background-color: var(--nav-bg);
            display: flex;
            border-top: 1px solid #222;
        }

        .nav-tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #777;
            font-size: 10px;
        }

        .nav-tab.active {
            background-color: var(--main-yellow);
            color: black;
        }

        .nav-tab svg {
            width: 22px;
            height: 22px;
            margin-bottom: 3px;
            fill: currentColor;
        }
    </style>
</head>
