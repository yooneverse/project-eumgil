events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;
    server_name jenkins.busaneumgil.com api.dev.busaneumgil.com ai.dev.busaneumgil.com grafana.busaneumgil.com portainer.busaneumgil.com sonarqube.busaneumgil.com plg.busaneumgil.com;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 100m;

    location = / { return 302 /jenkins/; }
    location = /api { return 302 /api/; }
    location ^~ /api/ieum/admin/ { return 404; }

    location /api/ {
      set $dev_backend_upstream "http://backend:8080";
      proxy_pass $dev_backend_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Port 443;
      proxy_set_header X-Forwarded-Prefix /api;
      proxy_request_buffering off;
      proxy_buffering off;
    }

    location = /jenkins { return 302 /jenkins/; }
    location /jenkins/ {
      set $jenkins_upstream "http://jenkins:8080";
      proxy_pass $jenkins_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Port 443;
      proxy_set_header X-Forwarded-Prefix /jenkins;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_request_buffering off;
      proxy_buffering off;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name api.dev.busaneumgil.com;

    ssl_certificate /etc/letsencrypt/live/api.dev.busaneumgil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.dev.busaneumgil.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 100m;
    location ^~ /ieum/admin/ { return 404; }

    location / {
      set $dev_backend_upstream "http://backend:8080";
      proxy_pass $dev_backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Port 443;
      proxy_request_buffering off;
      proxy_buffering off;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name ai.dev.busaneumgil.com;

    ssl_certificate /etc/letsencrypt/live/api.dev.busaneumgil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.dev.busaneumgil.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      set $dev_ai_upstream "http://ai:5000";
      proxy_pass $dev_ai_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_request_buffering off;
      proxy_buffering off;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name jenkins.busaneumgil.com;

    ssl_certificate /etc/letsencrypt/live/jenkins.busaneumgil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jenkins.busaneumgil.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 100m;

    location = /jenkins { return 301 /; }
    location /jenkins/ { return 301 /; }

    location / {
      set $jenkins_upstream "http://jenkins:8080";
      proxy_pass $jenkins_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Port 443;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_request_buffering off;
      proxy_buffering off;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name grafana.busaneumgil.com plg.busaneumgil.com;

    ssl_certificate /etc/letsencrypt/live/jenkins.busaneumgil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jenkins.busaneumgil.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /loki/ {
      allow 43.201.198.214;
      deny all;
      set $loki_upstream "http://loki:3100";
      proxy_pass $loki_upstream/loki/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_request_buffering off;
      proxy_buffering off;
    }

    location / {
      set $grafana_upstream "http://grafana:3000";
      proxy_pass $grafana_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_request_buffering off;
      proxy_buffering off;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name portainer.busaneumgil.com;

    ssl_certificate /etc/letsencrypt/live/jenkins.busaneumgil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jenkins.busaneumgil.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 404;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name sonarqube.busaneumgil.com;

    ssl_certificate /etc/letsencrypt/live/jenkins.busaneumgil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jenkins.busaneumgil.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 100m;

    location / {
      set $sonarqube_upstream "http://sonarqube:9000";
      proxy_pass $sonarqube_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_request_buffering off;
      proxy_buffering off;
    }
  }
}
