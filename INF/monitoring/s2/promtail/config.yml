server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${LOKI_PUSH_URL}

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    pipeline_stages:
      - docker: {}
      - regex:
          expression: '(?i)(?:^|[[:space:]])(?:level|lvl|severity)=(?P<level>trace|debug|info|warn|warning|error|fatal|critical)(?:[[:space:]]|$)'
      - regex:
          expression: '^(?P<level>[DIEWF])\d{4}[[:space:]]'
      - regex:
          expression: '^(?:\d{4}-\d{2}-\d{2}(?:[T ][^[:space:]]+)?[[:space:]]+)?(?P<level>TRACE|DEBUG|INFO|WARN|WARNING|ERROR|FATAL|CRITICAL)(?:[[:space:]]|$)'
      - labels:
          level:
    relabel_configs:
      - replacement: docker
        target_label: job
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        regex: "s14p31e102-prod"
        action: keep
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        regex: "backend|ai|graphhopper|graphhopper-blue|graphhopper-green|graphhopper-candidate|admin"
        action: keep
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: compose_project
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: compose_service
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service_name
      - replacement: prod
        target_label: environment
      - replacement: s2-prod
        target_label: runtime_stack
