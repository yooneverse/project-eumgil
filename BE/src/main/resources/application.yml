spring:
  application:
    name: e102
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    urls-primary-name: 인증

social:
  provider:
    kakao:
      user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
    naver:
      user-info-uri: ${NAVER_USER_INFO_URI:https://openapi.naver.com/v1/nid/me}
    google:
      user-info-uri: ${GOOGLE_USER_INFO_URI:https://openidconnect.googleapis.com/v1/userinfo}

external:
  kakao:
    local:
      base-url: ${KAKAO_LOCAL_BASE_URL:https://dapi.kakao.com}
      api-key: ${KAKAO_REST_API_KEY:}
  ai:
    base-url: ${AI_BASE_URL:http://localhost:5000}

report:
  idempotency:
    cleanup-cron: ${REPORT_IDEMPOTENCY_CLEANUP_CRON:0 0 * * * *}
  image-storage:
    bucket: ${REPORT_IMAGE_STORAGE_BUCKET:${S3_BUCKET:${MINIO_BUCKET:e102-report-images}}}
    region: ${REPORT_IMAGE_STORAGE_REGION:${S3_REGION:${MINIO_REGION:ap-northeast-2}}}
    endpoint: ${REPORT_IMAGE_STORAGE_ENDPOINT:${S3_ENDPOINT:${MINIO_ENDPOINT:}}}
    access-key: ${REPORT_IMAGE_STORAGE_ACCESS_KEY:${S3_ACCESS_KEY:${MINIO_ROOT_USER:}}}
    secret-key: ${REPORT_IMAGE_STORAGE_SECRET_KEY:${S3_SECRET_KEY:${MINIO_ROOT_PASSWORD:}}}
    key-prefix: ${REPORT_IMAGE_STORAGE_KEY_PREFIX:hazard-reports}
    presign-ttl: ${REPORT_IMAGE_STORAGE_PRESIGN_TTL:10m}
    max-content-length: ${REPORT_IMAGE_STORAGE_MAX_CONTENT_LENGTH:10MB}
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/heic
      - image/heif

auth:
  test:
    enabled: ${AUTH_TEST_ENABLED:false}
    kakao-javascript-key: ${AUTH_TEST_KAKAO_JAVASCRIPT_KEY:}
    naver-client-id: ${AUTH_TEST_NAVER_CLIENT_ID:}
    google-client-id: ${AUTH_TEST_GOOGLE_CLIENT_ID:}

graphhopper:
  base-url: ${GRAPHHOPPER_BASE_URL:http://localhost:8989}
  connect-timeout: ${GRAPHHOPPER_CONNECT_TIMEOUT:5s}
  read-timeout: ${GRAPHHOPPER_READ_TIMEOUT:5s}
  active-slot-key: ${GRAPHHOPPER_ACTIVE_SLOT_KEY:graphhopper:active-slot}
  previous-slot-key: ${GRAPHHOPPER_PREVIOUS_SLOT_KEY:graphhopper:previous-slot}
  blue-url-key: ${GRAPHHOPPER_BLUE_URL_KEY:graphhopper:blue:url}
  green-url-key: ${GRAPHHOPPER_GREEN_URL_KEY:graphhopper:green:url}
  blue-url: ${GRAPHHOPPER_BLUE_URL:http://graphhopper-blue:8989}
  green-url: ${GRAPHHOPPER_GREEN_URL:http://graphhopper-green:8989}
  health-url: ${GRAPHHOPPER_HEALTH_URL:http://localhost:8990/healthcheck}
  blue-health-url: ${GRAPHHOPPER_BLUE_HEALTH_URL:http://graphhopper-blue:8990/healthcheck}
  green-health-url: ${GRAPHHOPPER_GREEN_HEALTH_URL:http://graphhopper-green:8990/healthcheck}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:${SERVER_PORT:8080}}
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,prometheus}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:never}
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

odsay:
  base-url: ${ODSAY_API_BASE_URL:https://api.odsay.com/v1/api}
  api-key: ${ODSAY_API_KEY:}
  connect-timeout: ${ODSAY_CONNECT_TIMEOUT:5s}
  read-timeout: ${ODSAY_READ_TIMEOUT:5s}

busan:
  bims:
    base-url: ${BUSAN_BIMS_API_BASE_URL:https://apis.data.go.kr/6260000/BusanBIMS}
    service-key: ${BUSAN_BIMS_SERVICE_KEY_DECODING:}
    connect-timeout: ${BUSAN_BIMS_CONNECT_TIMEOUT:1s}
    read-timeout: ${BUSAN_BIMS_READ_TIMEOUT:6s}
