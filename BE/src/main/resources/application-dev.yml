spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database: postgresql
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
  sql:
    init:
      mode: always

auth:
  test:
    enabled: ${AUTH_TEST_ENABLED:true}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}

openapi:
  server-url: ${OPENAPI_SERVER_URL:https://api.dev.busaneumgil.com}

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER:e102-dev}
  access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
  refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:14d}
  signup-token-ttl: ${JWT_SIGNUP_TOKEN_TTL:10m}

management:
  metrics:
    tags:
      deployment_env: dev
      runtime_stack: s1-dev
